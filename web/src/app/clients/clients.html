<mat-tab-group class="secondary-tabs">
  <mat-tab label="General">
    <div class="sub-content">
      <app-fields [entity]="'clients'"/>
    </div>
  </mat-tab>
  <mat-tab label="Client(s)">
    <div class="sub-content">
      @if(loading()) {
        <mat-spinner></mat-spinner>
      } @else {
        <div class="table-actions">
          <mat-form-field>
            <mat-label>Filter</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mia" #input>
          </mat-form-field>

          <button mat-stroked-button color="primary">Add</button>
        </div>

        <div class="mat-elevation-z8">
          <table mat-table [dataSource]="dataSource" matSort>

            <ng-container matColumnDef="row">
              <th mat-header-cell *matHeaderCellDef mat-sort-header> # </th>
              <td mat-cell *matCellDef="let row; let i = index"> {{i + 1}} </td>
            </ng-container>

            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
              <td mat-cell *matCellDef="let row"> {{row.name}} </td>
            </ng-container>

            <ng-container matColumnDef="client_code">
              <th mat-header-cell *matHeaderCellDef mat-sort-header> Client Code </th>
              <td mat-cell *matCellDef="let row"> {{row.client_code}} </td>
            </ng-container>

            <ng-container matColumnDef="no_linked_contacts">
              <th mat-header-cell *matHeaderCellDef mat-sort-header> Linked Contacts </th>
              <td mat-cell *matCellDef="let row"> {{row.no_linked_contacts}} </td>
            </ng-container>

            <ng-container matColumnDef="edit">
              <th mat-header-cell *matHeaderCellDef mat-sort-header> Edit </th>
              <td mat-cell *matCellDef="let row"> <button matButton="filled">Edit</button> </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            <!-- Row shown when there is no matching data. -->
            <tr class="mat-row" *matNoDataRow>
              <td class="mat-cell" colspan="5">No client(s) found.</td>
            </tr>
          </table>

          <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
        </div>
      }
    </div>
  </mat-tab>
</mat-tab-group>
