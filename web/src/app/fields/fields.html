@if(loading()) {
  <div class="spinner-container">
    <mat-spinner></mat-spinner>
  </div>
} @else {
  <mat-form-field>
    <mat-label>Filter</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mia" #input>
  </mat-form-field>

  <div class="mat-elevation-z8">
    <table mat-table [dataSource]="dataSource" matSort>

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> # </th>
        <td mat-cell *matCellDef="let row; let i = index"> {{i + 1}} </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Description </th>
        <td mat-cell *matCellDef="let row"> {{row.description}} </td>
      </ng-container>

      <ng-container matColumnDef="field_type">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Field Type </th>
        <td mat-cell *matCellDef="let row"> {{row.field_type}} </td>
      </ng-container>

      <ng-container matColumnDef="compulsory">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Compulsory </th>
        <td mat-cell *matCellDef="let row"> {{ row.compulsory ? 'Yes' : 'No' }} </td>
      </ng-container>

      <ng-container matColumnDef="additional_information">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Additional Information </th>
        <td mat-cell *matCellDef="let row"> {{row.additional_information}} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="5">No data matching the filter "{{input.value}}"</td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
  </div>
}
